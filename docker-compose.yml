version: "3.9"

services:
  kitchen-recipe-calculator:
    image: node:20-alpine
    container_name: kitchen-recipe-calculator-2
    working_dir: /app
    ports:
      - "5050:5000"
    restart: unless-stopped

    command: >
      sh -c "
      apk add --no-cache git &&
      git clone https://github.com/shyjuissac/Kitchen-Recipe-Calculator.git . &&
      npm install &&
      npm start
      "
